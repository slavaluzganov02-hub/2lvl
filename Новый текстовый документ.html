<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Список дел</title>
  <script src="https://unpkg.com/vue@3"></script>

  <style>
    *{
      color: white;
    }
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }

    #app {
      background: #505050;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      border-radius: 8px;
    }

    input {
      width: 70%;
      padding: 6px;
      color: black;
    }

    button {
      padding: 6px 10px;
      margin-left: 5px;
      cursor: pointer;
      background-color: rgb(87, 87, 87);
      border-color: red;
    }

    ul {
      padding: 0;
      list-style: none;
      margin-top: 20px;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .done {
      text-decoration: line-through;
      color: gray;
    }
  </style>
</head>
<body>

<div id="app">
  <h2>Список дел</h2>


  <input  type="text"  v-model="newTask" placeholder="Введите задачу">
  <button @click="addTask">Добавить</button>

  
  <p v-if="tasks.length === 0">Задач пока нет</p>

 
  <ul>
    <li v-for="(task, index) in tasks" :key="index">
      <span
        :class="{ done: task.completed }"
        @click="toggleTask(index)"
      >
        {{ task.text }}
      </span>

      <button @click="removeTask(index)">❌</button>
    </li>
  </ul>

  
  <p>Осталось задач: {{ remainingTasks }}</p>
</div>

<script>
Vue.createApp({
  data() {
    return {
      newTask: '',
      tasks: []
    }
  },

  methods: {
    addTask() {
      if (this.newTask.trim() === '') return

      this.tasks.push({
        text: this.newTask,
        completed: false
      })

      this.newTask = ''
    },

    removeTask(index) {
      this.tasks.splice(index, 1)
    },

    toggleTask(index) {
      this.tasks[index].completed = !this.tasks[index].completed
    }
  },

  computed: {
    remainingTasks() {
      return this.tasks.filter(task => !task.completed).length
    }
  }
}).mount('#app')
</script>

</body>
</html>
